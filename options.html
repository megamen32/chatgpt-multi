<!doctype html>
<html translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ChatGPT Multi Pane — Настройки</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0f1012; color: #f4f4f5; font: 14px/1.5 -apple-system, system-ui, sans-serif; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 28px 20px 60px; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: #a1a1aa; margin: 0 0 24px; }
    .group { border: 1px solid rgba(255,255,255,.12); border-radius: 14px; padding: 6px 16px; margin-bottom: 18px; background: #17181d; }
    .group > h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #71717a; margin: 14px 2px 6px; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 2px; border-top: 1px solid rgba(255,255,255,.06); }
    .row:first-of-type { border-top: 0; }
    .row .meta { flex: 1; min-width: 0; }
    .row .meta .name { font-weight: 600; }
    .row .meta .desc { color: #a1a1aa; font-size: 12.5px; }
    input[type=number] { width: 72px; background: #0f1012; color: #f4f4f5; border: 1px solid rgba(255,255,255,.18); border-radius: 8px; padding: 6px 8px; }
    .text-input { background: #0f1012; color: #f4f4f5; border: 1px solid rgba(255,255,255,.18); border-radius: 8px; padding: 6px 9px; font: inherit; min-width: 150px; }
    select.text-input { min-width: 120px; }
    .switch { position: relative; width: 42px; height: 24px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: rgba(255,255,255,.18); border-radius: 999px; transition: .15s; cursor: pointer; }
    .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .15s; }
    input:checked + .slider { background: #10a37f; }
    input:checked + .slider::before { transform: translateX(18px); }
    .saved { color: #10a37f; font-size: 12px; height: 16px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ChatGPT Multi Pane</h1>
    <p class="sub">Настройки производительности и фич. Изменения применяются сразу.</p>
    <div id="root"></div>
    <div class="saved" id="saved"></div>
  </div>
  <script src="src/lib/settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
